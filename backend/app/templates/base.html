<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Tampinha Mágica" }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script defer src="/static/js/app.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/dashboard">
      <span class="brand-mark">♻</span>
      <span>
        <strong>Tampinha Mágica</strong>
        <small>Créditos por reciclagem</small>
      </span>
    </a>
    <button class="menu-button" data-menu-toggle aria-label="Abrir menu">☰</button>
    <nav class="nav" data-menu>
      <a href="/dashboard">Início</a>
      <a href="/students">Alunos</a>
      <a href="/classrooms">Turmas</a>
      <a href="/transactions">Depósitos</a>
      <a href="/ranking">Ranking</a>
      <a href="/devices">Maquininhas</a>
      <a href="/campaigns">Campanhas</a>
      <a href="/backups">Backups</a>
      <a href="/help">Ajuda</a>
      <a href="/logout" class="danger-link">Sair</a>
    </nav>
  </header>

  <main class="page">
    {% if flash %}<div class="alert success">{{ flash }}</div>{% endif %}
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
